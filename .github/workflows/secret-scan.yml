name: Secret Scan (gitleaks)

# Scans commits AND files for secrets on every PR and push to main.
# Also runs weekly to catch secrets pushed directly to the default branch.
# Fails CI if any secret is detected.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  schedule:
    - cron: "6 2 6 * *"  # monthly scattered (was: 0 6 * * 1)
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Secret Scan
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: ffreis-org/ffreis-workflows-general/.github/workflows/general-gitleaks.yml@3858e9e74c805067e454740b195372c7195f333b # v1.5.0
    with:
      working-directory: .
      scan-history: true
      upload-sarif: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
