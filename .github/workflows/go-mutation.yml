name: Go Mutation (lambdas-packer)

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * 0" # Sundays 02:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mutation:
    if: ${{ !github.event.pull_request.draft }}
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-mutation.yml@ed2f7d29467bf1fd6ec40df3953b3ee128ba3f04
    with:
      working-directory: .
      packages: "./internal/..."
      threshold: 60
