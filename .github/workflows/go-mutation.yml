name: Go Mutation (lambdas-packer)

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  schedule:
    - cron: "40 9 11 * *"  # monthly scattered (was: 0 2 * * 0)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutation:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-mutation.yml@3858e9e74c805067e454740b195372c7195f333b # v1.5.0
    with:
      working-directory: .
      packages: "./internal/..."
      threshold: 60
