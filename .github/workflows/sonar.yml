name: SonarCloud

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    # Set repository variable SONAR_ENABLED=false to skip this job entirely.
    # Default: runs. If SONAR_TOKEN is missing, fails explicitly with instructions.
    #
    # Skip running on forked PRs (secrets are not available).
    if: vars.SONAR_ENABLED != 'false' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"
          cache: true

      - name: Verify SonarCloud configuration
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          missing=""
          if [ -z "${SONAR_TOKEN}" ]; then
            missing="${missing}  • SONAR_TOKEN (secret): your SonarCloud token — sonarcloud.io → My Account → Security\n"
          fi
          if [ ! -f "sonar-project.properties" ]; then
            missing="${missing}  • sonar-project.properties (file): required to define sonar.projectKey and sonar.organization\n"
          else
            if ! grep -qE '^[[:space:]]*sonar[.]projectKey=' sonar-project.properties; then
              missing="${missing}  • sonar.projectKey (in sonar-project.properties): project key must exist in SonarCloud\n"
            fi
            if ! grep -qE '^[[:space:]]*sonar[.]organization=' sonar-project.properties; then
              missing="${missing}  • sonar.organization (in sonar-project.properties): SonarCloud organization slug\n"
            fi
          fi
          if [ -n "${missing}" ]; then
            echo "::error title=SonarCloud not configured::Missing configuration:"
            printf "%b" "${missing}"
            echo ""
            echo "Add secrets: Settings → Secrets and variables → Actions → New repository secret"
            echo "To skip this job entirely: Settings → Variables → add SONAR_ENABLED=false"
            exit 1
          fi

      - name: Generate coverage for SonarCloud
        run: |
          go test ./... \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -count=1 \
            -timeout=120s

      - name: SonarCloud Scan
        # nosemgrep: generic.secrets.security.detected-sonarqube-docs-api-key.detected-sonarqube-docs-api-key
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.go.coverage.reportPaths=coverage.out
            -Dsonar.sources=.
            -Dsonar.exclusions=vendor/**,**/*_test.go
            -Dsonar.tests=.
            -Dsonar.test.inclusions=**/*_test.go
