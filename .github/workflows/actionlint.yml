name: Workflow Lint (actionlint)

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-actionlint.yml@a02d736d25fa99fca8b4b623af9467d7afc472a4
    with:
      working-directory: .
