name: Shellcheck

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.sh"
      - ".github/workflows/shellcheck.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    timeout-minutes: 15
    name: shellcheck
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-shellcheck.yml@a02d736d25fa99fca8b4b623af9467d7afc472a4
    with:
      working-directory: .
