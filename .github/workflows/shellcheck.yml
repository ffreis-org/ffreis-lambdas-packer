name: Shellcheck

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.sh"
      - ".github/workflows/shellcheck.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: shellcheck
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-shellcheck.yml@01e2b12e992621fecf074b8a202f66044196f3bf
    with:
      working-directory: .
