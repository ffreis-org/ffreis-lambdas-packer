name: Go CI (lambdas-packer)

on:
  pull_request:
    branches: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/go-*.yml"
  push:
    branches: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/go-*.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fmt:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-fmt.yml@ed2f7d29467bf1fd6ec40df3953b3ee128ba3f04
    with:
      working-directory: .

  lint:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-lint.yml@ed2f7d29467bf1fd6ec40df3953b3ee128ba3f04
    needs: [fmt]
    with:
      working-directory: .

  test:
    if: ${{ !github.event.pull_request.draft }}
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-test.yml@ed2f7d29467bf1fd6ec40df3953b3ee128ba3f04
    needs: [fmt]
    with:
      working-directory: .
      run-govulncheck: true
      coverage-artifact-name: lambdas-packer-coverage

  build:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-build.yml@ed2f7d29467bf1fd6ec40df3953b3ee128ba3f04
    needs: [fmt]
    with:
      working-directory: .

  coverage:
    if: ${{ !github.event.pull_request.draft }}
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-coverage.yml@ed2f7d29467bf1fd6ec40df3953b3ee128ba3f04
    needs: [test]
    with:
      working-directory: .
      coverage-threshold: 0

  docs:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-docs.yml@ed2f7d29467bf1fd6ec40df3953b3ee128ba3f04
    needs: [fmt]
    with:
      working-directory: .
      require-package-docs: true

  security:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-security.yml@ed2f7d29467bf1fd6ec40df3953b3ee128ba3f04
    with:
      working-directory: .

  semgrep:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-semgrep.yml@ed2f7d29467bf1fd6ec40df3953b3ee128ba3f04
    with:
      working-directory: .
