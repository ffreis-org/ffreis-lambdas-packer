name: Go CI (lambdas-packer)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/go-*.yml"
  push:
    branches: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/go-*.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    permissions:
      contents: read
    uses: ffreis-org/ffreis-workflows-go/.github/workflows/go-fmt.yml@3858e9e74c805067e454740b195372c7195f333b # v1.5.0
    with:
      working-directory: .

  lint:
    permissions:
      contents: read
    uses: ffreis-org/ffreis-workflows-go/.github/workflows/go-lint.yml@3858e9e74c805067e454740b195372c7195f333b # v1.5.0
    needs: [fmt]
    with:
      working-directory: .

  test:
    permissions:
      contents: read
    uses: ffreis-org/ffreis-workflows-go/.github/workflows/go-test.yml@3858e9e74c805067e454740b195372c7195f333b # v1.5.0
    needs: [fmt]
    with:
      working-directory: .
      run-govulncheck: true
      coverage-artifact-name: lambdas-packer-coverage

  build:
    permissions:
      contents: read
    uses: ffreis-org/ffreis-workflows-go/.github/workflows/go-build.yml@3858e9e74c805067e454740b195372c7195f333b # v1.5.0
    needs: [fmt]
    with:
      working-directory: .

  coverage:
    permissions:
      contents: read
    uses: ffreis-org/ffreis-workflows-go/.github/workflows/go-coverage.yml@3858e9e74c805067e454740b195372c7195f333b # v1.5.0
    needs: [test]
    with:
      working-directory: .
      coverage-threshold: 0

  docs:
    permissions:
      contents: read
    uses: ffreis-org/ffreis-workflows-go/.github/workflows/go-docs.yml@3858e9e74c805067e454740b195372c7195f333b # v1.5.0
    needs: [fmt]
    with:
      working-directory: .
      require-package-docs: true

  security:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: ffreis-org/ffreis-workflows-go/.github/workflows/go-security.yml@3858e9e74c805067e454740b195372c7195f333b # v1.5.0
    with:
      working-directory: .

  semgrep:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: ffreis-org/ffreis-workflows-go/.github/workflows/go-semgrep.yml@3858e9e74c805067e454740b195372c7195f333b # v1.5.0
    with:
      working-directory: .
