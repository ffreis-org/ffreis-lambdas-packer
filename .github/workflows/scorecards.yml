name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: "20 7 * * 2"
  push:
    branches: [main]

permissions:
  contents: read
  actions: read
  security-events: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scorecard:
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-scorecard.yml@a02d736d25fa99fca8b4b623af9467d7afc472a4
    with:
      upload-sarif: true
      publish-results: true
